# Producción (VM Ubuntu sobre Hyper-V). Ver docs/ARQUITECTURA-DESPLIEGUE.md.
# Uso: docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Único servicio público: caddy (80/443). Postgres y Redis NO publican puertos.
name: jephub

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?define APP_DOMAIN en .env.production}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [web]

  # Migraciones (one-shot) antes de arrancar web/worker.
  migrate:
    build: { context: ., target: worker }
    command: pnpm prisma migrate deploy
    env_file: .env.production
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  web:
    build: { context: ., target: runner }
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
    # sin ports: solo accesible vía caddy

  worker:
    build: { context: ., target: worker }
    restart: unless-stopped
    command: pnpm worker
    env_file: .env.production
    depends_on:
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:?}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # sin ports: privado

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # sin ports: privado

  # Backups lógicos automáticos con rotación (7 diarios / 4 semanales / 6 mensuales).
  backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
    volumes:
      - ./backups:/backups
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
