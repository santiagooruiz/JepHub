# Dev: base de datos + redis locales.
# (El despliegue de producción está en docs/ARQUITECTURA-DESPLIEGUE.md)
services:
  postgres:
    image: postgres:16
    container_name: jephub-postgres
    environment:
      POSTGRES_USER: jep
      POSTGRES_PASSWORD: jep
      POSTGRES_DB: jephub
    ports:
      # 5433 en el host para no chocar con un PostgreSQL nativo en 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: jephub-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    container_name: jephub-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jep
      MINIO_ROOT_PASSWORD: jep-minio-dev
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # consola web
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
